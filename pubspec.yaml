name: google_maps_place_picker_mb
description: A Flutter plugin which provides 'Picking Place' using Google Maps
  widget. (MB version)
version: 3.1.3
homepage: https://github.com/adnankhan74444/google_maps_place_picker_mb

environment:
  sdk: ^3.7.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.0
  google_api_headers: ^4.4.4
  google_maps_flutter: ^2.12.1
  flutter_google_maps_webservices: ^1.1.1
  http: ^1.3.0
  provider: ^6.1.4
  tuple: ^2.0.2
  uuid: ^4.5.1
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter